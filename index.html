<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black; /* Fondo negro para las zonas donde no llega el video */
    display: flex;
    justify-content: center; /* Centra horizontalmente */
    align-items: center;     /* Centra verticalmente */
}

video {
    width: 100vw;
    height: 100vh;
    object-fit: contain; /* Esto asegura que el video se vea TODO sin deformarse */
}
</style>

</head>

<body>

<video autoplay muted loop playsinline>
    <source src="juegovirtualcomprimido.mp4" type="video/mp4">
</video>

</body>
</html>
